<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>星辰 · Sin-Cen Huang — AI 應用工程師 ｜數位心理建築師</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="../../assets/sin-cen-icon.png" type="image/png">
<link rel="preload" as="image" href="../../assets/portrait.jpg" fetchpriority="high">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=LXGW+WenKai+TC&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="portfolio.css">
<link rel="stylesheet" href="lightbox.css">
</head>

<body class="lang-zh">
<div id="root" class="portfolio"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="image-slot.js"></script>

<script type="text/babel" src="Lightbox.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Timeline.jsx"></script>
<script type="text/babel" src="AboutModal.jsx"></script>
<script type="text/babel" src="ProjectCard.jsx"></script>
<script type="text/babel" src="ProjectModal.jsx"></script>
<script type="text/babel" src="Projects.jsx"></script>
<script type="text/babel" src="CertModal.jsx"></script>
<script type="text/babel" src="Skills.jsx"></script>
<script type="text/babel" src="LearningJourney.jsx"></script>
<script type="text/babel" src="LifeCorner.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="FloatDock.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {
    const [active, setActive] = useState("about");
    const [highlightedCert, setHighlightedCert] = useState(null);
    const [aboutOpen, setAboutOpen] = useState(false);

    useEffect(() => {
      const sectionIds = ["hero", "projects", "skills", "learning", "life", "contact"];
      const onScroll = () => {
        document.documentElement.style.setProperty("--scroll-y", window.scrollY + "px");
        for (const id of [...sectionIds].reverse()) {
          const el = document.getElementById(id);
          if (!el) continue;
          const rect = el.getBoundingClientRect();
          if (rect.top <= 140) { setActive(id); break; }
        }
      };
      window.addEventListener("scroll", onScroll, true);
      onScroll();
      return () => window.removeEventListener("scroll", onScroll, true);
    }, []);

    const onNavigate = (id) => {
      if (id === "top") { window.scrollTo({ top: 0, behavior: "smooth" }); return; }
      const el = document.getElementById(id);
      if (el) {
        const y = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top: y, behavior: "smooth" });
      }
    };

    const onCertClick = (idx) => {
      const el = document.getElementById("skills");
      if (el) {
        const y = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top: y, behavior: "smooth" });
      }
      setHighlightedCert(idx);
      window.clearTimeout(window.__certHL);
      window.__certHL = window.setTimeout(() => setHighlightedCert(null), 1800);
    };

    return (
      <React.Fragment>
        <window.Navbar active={active} onNavigate={onNavigate} onAboutOpen={() => setAboutOpen(true)} />
        <window.Hero
          onCTA={() => onNavigate("projects")}
          onContact={() => onNavigate("contact")}
          onCertClick={onCertClick}
          onAboutOpen={() => setAboutOpen(true)}
        />
        <window.AboutModal open={aboutOpen} onClose={() => setAboutOpen(false)} />
        <window.Projects />
        <window.Skills highlightedCert={highlightedCert} />
        <window.LearningJourney />
        <window.LifeCorner />
        <window.Contact />
        <window.FloatDock onNavigate={onNavigate} onAboutOpen={() => setAboutOpen(true)} />
      </React.Fragment>
    );
  }

  // Wait for window globals from babel-loaded files
  function mountWhenReady() {
    if (window.Navbar && window.Hero && window.AboutModal && window.Timeline && window.Projects && window.Skills && window.LearningJourney && window.LifeCorner && window.Contact && window.Lightbox && window.CertModal && window.FloatDock) {
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    } else {
      setTimeout(mountWhenReady, 50);
    }
  }
  mountWhenReady();
</script>
</body>
</html>
