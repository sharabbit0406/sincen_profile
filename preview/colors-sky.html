<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--white); }
  body { padding: 20px 24px; }
  .row { display: flex; gap: 0; align-items: stretch; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); }
  .sw { flex: 1; aspect-ratio: 2/1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
  .sw .name { font-family: var(--font-body); font-size: 11px; font-weight: 600; }
  .sw .hex  { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; margin-top: 2px; }
  .label { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--ink-700); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 14px; height: 14px; border-radius: 999px; background: var(--sky-500); display: inline-block; }
</style>
</head>
<body>
  <div class="label"><span class="dot"></span>Sky — Cinnamoroll primary</div>
  <div class="row">
    <div class="sw" style="background:#F4FAFE;color:#1F2A37"><div class="name">sky-50</div><div class="hex">#F4FAFE</div></div>
    <div class="sw" style="background:#EAF6FD;color:#1F2A37"><div class="name">sky-100</div><div class="hex">#EAF6FD</div></div>
    <div class="sw" style="background:#D6ECFA;color:#1F2A37"><div class="name">sky-200</div><div class="hex">#D6ECFA</div></div>
    <div class="sw" style="background:#C9E7F8;color:#1F2A37"><div class="name">sky-300</div><div class="hex">#C9E7F8</div></div>
    <div class="sw" style="background:#B4DEF7;color:#1F2A37"><div class="name">sky-400</div><div class="hex">#B4DEF7</div></div>
    <div class="sw" style="background:#A6D8F5;color:#1F2A37"><div class="name">sky-500 ★</div><div class="hex">#A6D8F5</div></div>
    <div class="sw" style="background:#7FC2E8;color:#1F2A37"><div class="name">sky-600</div><div class="hex">#7FC2E8</div></div>
    <div class="sw" style="background:#4B9CD3;color:#fff"><div class="name">sky-700</div><div class="hex">#4B9CD3</div></div>
    <div class="sw" style="background:#2F7DB0;color:#fff"><div class="name">sky-800</div><div class="hex">#2F7DB0</div></div>
    <div class="sw" style="background:#1E5C8A;color:#fff"><div class="name">sky-900</div><div class="hex">#1E5C8A</div></div>
  </div>
</body>
</html>
