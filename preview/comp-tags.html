<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--white);}
  body{padding:24px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13px;font-weight:500;padding:6px 12px;border-radius:999px;}
  .pink{background:var(--gradient-frame);color:var(--pink-800);border:1px solid rgba(248,187,208,.55);}
  .sky{background:var(--gradient-frame);color:var(--sky-800);border:1px solid rgba(166,216,245,.6);}
  .solid{background:var(--gradient-frame-strong);color:var(--ink-900);border:1px solid rgba(127,194,232,.55);}
  .neutral{background:var(--gradient-frame-soft);color:var(--ink-700);border:1px solid var(--ink-200);}
  .dot{width:6px;height:6px;border-radius:999px;background:var(--pink-500);}
</style>
</head>
<body>
  <span class="tag pink"><span class="dot"></span>Featured</span>
  <span class="tag sky">Python</span>
  <span class="tag sky">LangGraph</span>
  <span class="tag sky">Gemini</span>
  <span class="tag solid">RAG</span>
  <span class="tag pink">情緒陪伴</span>
  <span class="tag neutral">2025.11</span>
</body>
</html>
