<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--white);}
  body{padding:24px 32px;display:flex;gap:18px;align-items:center;}
  .field{flex:1;display:flex;flex-direction:column;gap:6px;}
  label{font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--ink-700);}
  input,textarea{font-family:var(--font-body);font-size:14px;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid rgba(166,216,245,.5);background:var(--gradient-frame-soft);color:var(--ink-900);outline:none;transition:.2s var(--ease-out-soft);}
  input:focus,textarea:focus{border-color:var(--sky-500);box-shadow:var(--shadow-ring-sky);background:#fff;}
  .help{font-family:var(--font-body);font-size:11px;color:var(--ink-500);}
  textarea{height:64px;resize:none;}
  .row{display:flex;gap:14px;width:100%;}
</style>
</head>
<body>
  <div class="row">
    <div class="field">
      <label>姓名</label>
      <input value="黃心岑">
    </div>
    <div class="field">
      <label>Email</label>
      <input value="sharabbit0406@gmail.com">
      <span class="help">Used only for follow-up.</span>
    </div>
    <div class="field" style="flex:1.4">
      <label>訊息</label>
      <textarea>想聊聊 RAG 架構嗎？</textarea>
    </div>
  </div>
</body>
</html>
