<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);}
  body{padding:24px 28px;display:flex;gap:18px;align-items:stretch;justify-content:center;}
  .card{flex:1;max-width:300px;background:var(--gradient-frame-soft);border:1px solid rgba(166,216,245,.4);border-radius:var(--radius-md);box-shadow:var(--shadow-soft);padding:18px;display:flex;flex-direction:column;gap:8px;transition:.25s var(--ease-overshoot);}
  .card.hover{transform:translateY(-4px);box-shadow:var(--shadow-lift);border-color:var(--sky-300);}
  .thumb{height:78px;border-radius:12px;background:var(--gradient-frame-strong);border:1px solid rgba(166,216,245,.5);display:flex;align-items:center;justify-content:center;}
  .thumb svg{width:42px;height:42px;color:var(--sky-700);}
  .title{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--ink-900);}
  .desc{font-family:var(--font-body);font-size:12px;color:var(--ink-500);line-height:1.5;}
  .row{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;}
  .chip{font-family:var(--font-mono);font-size:10px;padding:3px 8px;border-radius:999px;background:var(--gradient-frame);color:var(--sky-800);border:1px solid rgba(166,216,245,.6);}
</style>
</head>
<body>
  <div class="card">
    <div class="thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 0 0-7 7c0 4 3 7 7 7s7-3 7-7a7 7 0 0 0-7-7z"/><path d="M9 22h6M10 18v4M14 18v4"/></svg></div>
    <div class="title">心伴 MindCompanion</div>
    <div class="desc">結合諮商技巧設計 Prompt，實作情緒量化與高風險防治護欄。</div>
    <div class="row"><span class="chip">Python</span><span class="chip">RAG</span><span class="chip">LINE</span></div>
  </div>
  <div class="card hover">
    <div class="thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><path d="M9.5 9.5L7.5 7.5M14.5 9.5L16.5 7.5M9.5 14.5L7.5 16.5M14.5 14.5L16.5 16.5"/></svg></div>
    <div class="title">Charlie's Agents</div>
    <div class="desc">混合式 RAG + 二階段 Rerank，透過 MCP 大幅提升擴充性。</div>
    <div class="row"><span class="chip">LangGraph</span><span class="chip">MCP</span><span class="chip">Azure</span></div>
  </div>
</body>
</html>
