<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--white);}
  body{padding:24px 28px;display:flex;gap:14px;align-items:stretch;}
  .col{flex:1;display:flex;flex-direction:column;gap:8px;}
  .swatch{height:90px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:10px 14px;}
    .swatch.soft{background:var(--gradient-frame-soft);border:1px solid rgba(166,216,245,.3);}
    .swatch.base{background:var(--gradient-frame);border:1px solid rgba(166,216,245,.4);}
    .swatch.strong{background:var(--gradient-frame-strong);border:1px solid rgba(166,216,245,.45);}
  .name{font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--ink-900);}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);}
  .lab{font-family:var(--font-body);font-size:11px;font-weight:600;color:var(--ink-900);}
  .desc{font-family:var(--font-body);font-size:11px;color:var(--ink-500);line-height:1.5;}
</style>
</head>
<body>
  <div class="col">
    <div class="swatch soft"><div><div class="lab">--gradient-frame-soft</div><div class="meta">#F6FAFD → #FDF7FA</div></div></div>
    <div class="desc">Cards · inputs · resting surfaces</div>
  </div>
  <div class="col">
    <div class="swatch base"><div><div class="lab">--gradient-frame ★</div><div class="meta">#ECF4FB → #FAF0F6</div></div></div>
    <div class="desc">Canonical — buttons · tags · chips · icons</div>
  </div>
  <div class="col">
    <div class="swatch strong"><div><div class="lab">--gradient-frame-strong</div><div class="meta">#DEEDF8 → #F7E4EC</div></div></div>
    <div class="desc">Hover state · emphasis only</div>
  </div>
</body>
</html>
