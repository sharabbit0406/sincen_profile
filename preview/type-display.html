<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--white);}
  body{padding:28px 32px;}
  .specimen{display:flex;align-items:baseline;justify-content:space-between;gap:24px;}
  .left .face{font-family:var(--font-display);font-weight:700;font-size:72px;line-height:1;color:var(--ink-900);letter-spacing:-0.02em;}
  .left .sub{font-family:var(--font-display);font-weight:500;font-size:18px;color:var(--ink-700);margin-top:8px;}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);}
  .pill{font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sky-700);background:var(--sky-100);padding:3px 10px;border-radius:999px;}
</style>
</head>
<body>
  <div class="specimen">
    <div class="left">
      <div class="face">Quicksand</div>
      <div class="sub">жҳҹиҫ° В· ең“жҪӨгҖҒиј•зӣҲгҖҒзҷӮзҷ’</div>
    </div>
    <div class="right">
      <div class="pill">Display</div>
      <div class="meta">Weights 400 В· 500 В· 600 В· 700</div>
      <div class="meta">Headlines В· Logo В· Hero</div>
    </div>
  </div>
</body>
</html>
