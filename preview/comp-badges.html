<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);}
  body{padding:24px 28px;display:flex;gap:14px;align-items:stretch;justify-content:center;flex-wrap:wrap;}
  .badge{background:var(--gradient-frame-soft);border:1px solid rgba(166,216,245,.4);border-radius:var(--radius-md);box-shadow:var(--shadow-soft);padding:14px 16px;display:flex;align-items:center;gap:14px;min-width:200px;}
  .ic{width:42px;height:42px;border-radius:12px;background:var(--gradient-frame-strong);border:1px solid rgba(166,216,245,.6);display:flex;align-items:center;justify-content:center;color:var(--sky-700);flex-shrink:0;}
  .ic.pink{background:var(--gradient-frame-strong);border-color:rgba(248,192,211,.6);color:var(--pink-700);}
  .title{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--ink-900);line-height:1.3;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:2px;}
  .score{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--sky-700);margin-left:auto;}
</style>
</head>
<body>
  <div class="badge">
    <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="6"/><path d="M12 14v8M8 18h8"/></svg></div>
    <div><div class="title">iPAS AI 應用規劃師</div><div class="meta">經濟部 · 2025</div></div>
    <span class="score">94</span>
  </div>
  <div class="badge">
    <div class="ic pink"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l4-8h10l4 8-9 10z"/></svg></div>
    <div><div class="title">Microsoft AI-900</div><div class="meta">Azure Fundamentals</div></div>
    <span class="score">929</span>
  </div>
  <div class="badge">
    <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 4h14v16H5z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg></div>
    <div><div class="title">生成式 AI 認證</div><div class="meta">資策會 · III</div></div>
    <span class="score">97.5</span>
  </div>
</body>
</html>
