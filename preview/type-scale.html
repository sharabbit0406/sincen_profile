<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--white);}
  body{padding:20px 28px;}
  table{width:100%;border-collapse:collapse;font-family:var(--font-body);}
  td{padding:6px 0;vertical-align:baseline;}
  td.name{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);width:90px;letter-spacing:.02em;}
  td.sample{font-family:var(--font-display);font-weight:600;color:var(--ink-900);line-height:1.1;letter-spacing:-0.01em;}
  td.spec{font-family:var(--font-mono);font-size:10px;color:var(--ink-400);text-align:right;width:90px;}
</style>
</head>
<body>
  <table>
    <tr><td class="name">fs-4xl</td><td class="sample" style="font-size:36px">承載使用者的心</td><td class="spec">60 / 1.1</td></tr>
    <tr><td class="name">fs-2xl</td><td class="sample" style="font-size:24px">精選專案 · Featured</td><td class="spec">36 / 1.3</td></tr>
    <tr><td class="name">fs-md</td><td class="sample" style="font-size:18px;font-weight:500">AI 應用工程師</td><td class="spec">20 / 1.6</td></tr>
    <tr><td class="name">fs-sm</td><td class="sample" style="font-size:13px;font-weight:400;font-family:var(--font-body);color:var(--ink-500)">caption · meta · timestamps</td><td class="spec">14 / 1.5</td></tr>
  </table>
</body>
</html>
