<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--white);}
  body{padding:24px 32px;}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;}
  .zh{font-family:'Noto Sans TC',sans-serif;}
  .zh .big{font-size:30px;font-weight:700;color:var(--ink-900);letter-spacing:.02em;line-height:1.3;}
  .zh .small{font-size:15px;font-weight:400;color:var(--ink-700);line-height:1.75;margin-top:6px;max-width:480px;}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);}
  .pill{font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sky-700);background:var(--sky-100);padding:3px 10px;border-radius:999px;}
</style>
</head>
<body>
  <div class="row">
    <div class="zh">
      <div class="big">心理洞察 × 科技落地</div>
      <div class="small">擁有心理學背景的 AI 開發者，致力於將人類需求轉化為可落地的 LLM 系統設計。</div>
    </div>
    <div class="right">
      <div class="pill">中文 · zh-TW</div>
      <div class="meta">Noto Sans TC</div>
      <div class="meta">400 · 500 · 700</div>
    </div>
  </div>
</body>
</html>
