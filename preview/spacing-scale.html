<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--white);}
  body{padding:24px 28px;display:flex;align-items:flex-end;gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--sky-300);border-radius:6px;width:18px;}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);}
  .nm{font-family:var(--font-body);font-size:11px;font-weight:600;color:var(--ink-900);}
</style>
</head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div>  <div class="nm">1</div><div class="lab">4px</div></div>
  <div class="col"><div class="bar" style="height:8px"></div>  <div class="nm">2</div><div class="lab">8px</div></div>
  <div class="col"><div class="bar" style="height:12px"></div> <div class="nm">3</div><div class="lab">12px</div></div>
  <div class="col"><div class="bar" style="height:16px"></div> <div class="nm">4</div><div class="lab">16px</div></div>
  <div class="col"><div class="bar" style="height:24px"></div> <div class="nm">5</div><div class="lab">24px</div></div>
  <div class="col"><div class="bar" style="height:32px"></div> <div class="nm">6</div><div class="lab">32px</div></div>
  <div class="col"><div class="bar" style="height:48px"></div> <div class="nm">7</div><div class="lab">48px</div></div>
  <div class="col"><div class="bar" style="height:64px"></div> <div class="nm">8</div><div class="lab">64px</div></div>
  <div class="col"><div class="bar" style="height:96px"></div> <div class="nm">9</div><div class="lab">96px</div></div>
</body>
</html>
